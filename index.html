// Jelszó ellenőrző függvény
async function checkPassword() {
  const correctHash = "f19cb00638f96c79acbe732a149c4558bb37d4c825bf01dd678f0652c968ace6";
  const inputField = document.getElementById("passwordInput");
  const input = inputField.value;
  const errorDiv = document.getElementById("loginError");
  const lockIcon = document.getElementById("lock-icon");

  const msgUint8 = new TextEncoder().encode(input);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const inputHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (inputHash === correctHash) {
    lockIcon.textContent = "🔓";
    
    setTimeout(() => {
      document.getElementById("login-screen").style.opacity = "0"; // Szebb átmenet
      setTimeout(() => {
        document.getElementById("login-screen").style.display = "none";
      }, 300);
    }, 500);
  } else {
    errorDiv.textContent = "Hibás jelszó!";
    inputField.value = ""; // Töröljük a rossz jelszót
    setTimeout(() => {
      errorDiv.innerHTML = "&nbsp;";
    }, 2000);
  }
}

// EZ A RÉSZ FELEL AZ ENTER-ÉRT:
document.getElementById("passwordInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault(); // Megakadályozza az oldal esetleges újratöltését
    checkPassword();
  }
});

// Globális figyelő biztonsági tartaléknak
window.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") {
    checkPassword();
  }
});

// Input mezők generálása
const container = document.getElementById("products");

function renderProducts() {
  container.innerHTML = "";
  for (const category in categories) {

  // A 2 kategória elválasztó
  if (category.includes("Fegyverek")) {
    const divider = document.createElement("div");
    divider.className = "divider";
    divider.innerHTML = `<span>🛠️ FEGYVERCRAFT 🛠️</span>`;
    container.appendChild(divider);
  }

  if (category.includes("Kohó - A")) {
    const divider = document.createElement("div");
    divider.className = "divider";
    divider.innerHTML = `<span>🛠️ BÁNYÁSZAT 🛠️</span>`;
    container.appendChild(divider);
  }

  if (category.includes("Drogok")) {
    const divider = document.createElement("div");
    divider.className = "divider";
    divider.innerHTML = `<span>🛠️ EGYÉB 🛠️</span>`;
    container.appendChild(divider);
  }

    const catDiv = document.createElement("div");
    catDiv.className = "category";
    catDiv.innerHTML = `<h2>${category}</h2>`;

    for (const product in categories[category]) {

  const { perBatch } = categories[category][product];

  const displayName = perBatch > 1
    ? `${product} <span class="batch">(${perBatch}db)</span>`
    : product;

  const div = document.createElement("div");
  div.className = "product";

  const inputId = product;

  div.innerHTML = `
    <label>${displayName}</label>
    <input type="number" min="0" value="0" id="${inputId}">
  `;

  catDiv.appendChild(div);

  // automatikus számolás
  div.querySelector("input").addEventListener("input", calculate);
}

    container.appendChild(catDiv);
  }
}
renderProducts();

// Maga a számolás
function calculate() {
  const totals = {};

  // Végigmegyünk az összes kategórián és terméken
  for (const category in categories) {
    for (const product in categories[category]) {
      const qty = Number(document.getElementById(product).value);
      if (qty <= 0) continue; // Ha 0, nem számol

      const { materials, perBatch } = categories[category][product];

      // Hány adag kell
      const batches = Math.ceil(qty / perBatch);

      // Minden anyag összesítése
      for (const mat in materials) {
        totals[mat] = (totals[mat] || 0) + materials[mat] * batches;
      }

      // Nem fogyó eszközök (pl. főzőkészlet)
      const tools = categories[category][product].tools;
      if (tools) {
        for (const tool in tools) {
          totals[tool] = (totals[tool] || 0) + tools[tool];
        }
      }
    }
  }

  // Eredmény kiírása
const result = document.getElementById("result");
result.innerHTML = "";

for (const mat in totals) {
  if (totals[mat] > 0) {

    const value = Number(totals[mat].toFixed(2)); // ← javítás

    const li = document.createElement("li");
    li.textContent = `${mat}: ${value}`;
    result.appendChild(li);
  }
}
}

// Nullázás gomb
function resetAll() {

  for (const category in categories) {
    for (const product in categories[category]) {
      document.getElementById(product).value = 0;
    }
  }

  document.getElementById("result").innerHTML = "";
  calculate();
}

// Másolás gomb
function exportSimple() {
  const resultItems = document.querySelectorAll("#result li");

  if (resultItems.length === 0) return;

  let text = "";

  resultItems.forEach(item => {
    text += item.textContent + "\n";
  });

  navigator.clipboard.writeText(text);
}
